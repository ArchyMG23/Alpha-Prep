services:
  - type: web
    name: alpha-prep
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User will need to provide this in Render dashboard
      - key: PORT
        value: 3000
