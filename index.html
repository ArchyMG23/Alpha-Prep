<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Alpha Prep - TCF, TEF & IELTS</title>
    <meta name="description" content="Plateforme de préparation complète pour les tests TCF Canada, TEF Canada et IELTS." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234f46e5%22/><text y=%22.9em%22 x=%2250%%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>α</text></svg>" />
    
    <!-- iOS Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alpha Prep" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234f46e5%22/><text y=%22.9em%22 x=%2250%%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>α</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root">
      <!-- Initial Loading Screen (CSS Only) -->
      <style>
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #f8fafc;
          z-index: 9999;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .loader-logo {
          width: 80px;
          height: 80px;
          background-color: #4f46e5;
          border-radius: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-size: 48px;
          font-weight: bold;
          margin-bottom: 24px;
          box-shadow: 0 20px 25px -5px rgb(79 70 229 / 0.2);
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .loader-text {
          font-weight: 900;
          color: #0f172a;
          font-size: 24px;
          letter-spacing: -0.025em;
        }
        .loader-spinner {
          margin-top: 16px;
          width: 24px;
          height: 24px;
          border: 3px solid #e2e8f0;
          border-top-color: #4f46e5;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .8; transform: scale(0.95); } }
      </style>
      <div class="initial-loader">
        <div class="loader-logo">α</div>
        <div class="loader-text">Alpha Prep</div>
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
